<!DOCTYPE html>
<html lang="ko" data-theme="cute">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>디지털 클락커 · 키캡키링</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overscroll-behavior: none; }
  body {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* ── 땡땡이(폴카닷) 배경 ── */
    background-color: var(--bg);
    background-image:
      radial-gradient(circle, var(--bg-dot) 6px, transparent 7px),
      radial-gradient(circle, var(--bg-dot) 6px, transparent 7px);
    background-size: var(--bg-dot-size) var(--bg-dot-size);
    background-position: 0 0, calc(var(--bg-dot-size) / 2) calc(var(--bg-dot-size) / 2);
    font-family: var(--font-sans);
    color: var(--text);
    user-select: none;
    overflow: hidden;
  }

  /* ── 키링 전체 ── */
  .keyring {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 볼체인 + 고리 */
  .chain {
    width: 90px;
    height: 60px;
    margin-bottom: -6px;
    display: flex;
    justify-content: center;
  }
  .chain svg { overflow: visible; }

  /* 투명 바디 */
  .body {
    width: 150px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    background: linear-gradient(135deg, var(--surface), var(--surface-2));
    border: 1.5px solid var(--surface-edge);
    border-radius: var(--radius-lg);
    box-shadow:
      0 18px 40px -12px rgba(120, 70, 90, 0.35),
      inset 0 1px 2px rgba(255,255,255,0.9),
      inset 0 -10px 22px rgba(220,190,205,0.3);
    backdrop-filter: blur(2px);
  }

  /* ── 키캡 ── */
  .keycap {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: var(--radius-md);
    background: linear-gradient(160deg, var(--keycap-face-a) 0%, var(--keycap-face-b) 70%, var(--keycap-face-c) 100%);
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow:
      0 6px 0 var(--keycap-side),            /* 키캡 옆벽(높이) */
      0 9px 14px rgba(120,80,100,0.25),
      inset 0 2px 3px rgba(255,255,255,0.95),
      inset 0 -3px 6px rgba(225,200,212,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform .04s ease, box-shadow .04s ease;
    will-change: transform;
  }
  .keycap .glyph {
    width: 64%;
    height: 64%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .keycap .glyph svg { width: 100%; height: 100%; }

  /* 눌림 상태 */
  .keycap.pressed {
    transform: translateY(5px);
    box-shadow:
      0 1px 0 var(--keycap-side),
      0 2px 5px rgba(120,80,100,0.25),
      inset 0 2px 4px rgba(220,196,208,0.55);
  }

  .title {
    position: fixed; top: 26px; left: 0; right: 0;
    text-align: center; font-size: var(--font-size-sm); letter-spacing: var(--tracking-title);
    color: var(--title); font-weight: var(--font-weight-bold);
  }
</style>
</head>
<body>
  <div class="title">DIGITAL CLACKER</div>

  <div class="keyring">
    <!-- 볼체인 + 고리 -->
    <div class="chain">
      <svg width="90" height="60" viewBox="0 0 90 60">
        <g stroke="#d6a9bb" stroke-width="3" fill="none">
          <path d="M45 60 C45 44 30 40 26 30 C22 20 30 12 40 12" />
        </g>
        <!-- 볼체인 구슬 -->
        <g fill="#e0b6c6">
          <circle cx="45" cy="56" r="3.2"/><circle cx="42" cy="49" r="3.2"/>
          <circle cx="37" cy="43" r="3.2"/><circle cx="30" cy="38" r="3.2"/>
          <circle cx="25" cy="31" r="3.2"/><circle cx="23" cy="23" r="3.2"/>
          <circle cx="28" cy="16" r="3.2"/><circle cx="36" cy="12.5" r="3.2"/>
        </g>
        <!-- 카라비너 고리 -->
        <g stroke="#d2a4b6" stroke-width="5" fill="none" stroke-linecap="round">
          <circle cx="58" cy="20" r="15"/>
        </g>
        <line x1="58" y1="9" x2="58" y2="31" stroke="#e8c4d2" stroke-width="3"/>
      </svg>
    </div>

    <!-- 투명 바디 -->
    <div class="body">
      <!-- 고양이 1: 동그란 눈 -->
      <div class="keycap" data-key="f" data-sound="hi" tabindex="0" aria-label="고양이 버튼 1">
        <span class="glyph">
          <svg viewBox="0 0 100 100">
            <!-- 귀 -->
            <path fill="#1b1b1f" d="M27 34 L22 13 L44 27 Z"/>
            <path fill="#1b1b1f" d="M73 34 L78 13 L56 27 Z"/>
            <path fill="#ffb3c8" d="M30 32 L27 20 L40 28 Z"/>
            <path fill="#ffb3c8" d="M70 32 L73 20 L60 28 Z"/>
            <!-- 얼굴 -->
            <circle cx="50" cy="56" r="30" fill="#fff" stroke="#1b1b1f" stroke-width="4"/>
            <!-- 볼터치 -->
            <circle cx="35" cy="63" r="5" fill="#ffb3c8"/>
            <circle cx="65" cy="63" r="5" fill="#ffb3c8"/>
            <!-- 눈 -->
            <circle cx="40" cy="52" r="4" fill="#1b1b1f"/>
            <circle cx="60" cy="52" r="4" fill="#1b1b1f"/>
            <!-- 코/입 -->
            <path d="M50 58 L50 61 M50 61 Q45 65 42 62 M50 61 Q55 65 58 62"
              fill="none" stroke="#1b1b1f" stroke-width="2.6" stroke-linecap="round"/>
            <!-- 수염 -->
            <g stroke="#1b1b1f" stroke-width="2.4" stroke-linecap="round">
              <line x1="18" y1="55" x2="31" y2="56"/><line x1="18" y1="62" x2="31" y2="61"/>
              <line x1="82" y1="55" x2="69" y2="56"/><line x1="82" y1="62" x2="69" y2="61"/>
            </g>
          </svg>
        </span>
      </div>

      <!-- 고양이 2: 웃는 눈 ^^ -->
      <div class="keycap" data-key="j" data-sound="lo" tabindex="0" aria-label="고양이 버튼 2">
        <span class="glyph">
          <svg viewBox="0 0 100 100">
            <!-- 귀 -->
            <path fill="#1b1b1f" d="M27 34 L22 13 L44 27 Z"/>
            <path fill="#1b1b1f" d="M73 34 L78 13 L56 27 Z"/>
            <path fill="#ffb3c8" d="M30 32 L27 20 L40 28 Z"/>
            <path fill="#ffb3c8" d="M70 32 L73 20 L60 28 Z"/>
            <!-- 얼굴 -->
            <circle cx="50" cy="56" r="30" fill="#fff" stroke="#1b1b1f" stroke-width="4"/>
            <!-- 볼터치 -->
            <circle cx="35" cy="63" r="5" fill="#ffb3c8"/>
            <circle cx="65" cy="63" r="5" fill="#ffb3c8"/>
            <!-- 웃는 눈 -->
            <path d="M35 53 Q40 47 45 53" fill="none" stroke="#1b1b1f" stroke-width="3" stroke-linecap="round"/>
            <path d="M55 53 Q60 47 65 53" fill="none" stroke="#1b1b1f" stroke-width="3" stroke-linecap="round"/>
            <!-- 코/입 -->
            <path d="M50 58 L50 61 M50 61 Q45 65 42 62 M50 61 Q55 65 58 62"
              fill="none" stroke="#1b1b1f" stroke-width="2.6" stroke-linecap="round"/>
            <!-- 수염 -->
            <g stroke="#1b1b1f" stroke-width="2.4" stroke-linecap="round">
              <line x1="18" y1="55" x2="31" y2="56"/><line x1="18" y1="62" x2="31" y2="61"/>
              <line x1="82" y1="55" x2="69" y2="56"/><line x1="82" y1="62" x2="69" y2="61"/>
            </g>
          </svg>
        </span>
      </div>
    </div>
  </div>

<script>
(function () {
  // ── 오디오: Web Audio API로 기계식 '딸깍' 합성 ──
  let ctx;
  function audio() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  // 모바일(특히 iOS) 오디오 언락:
  //  1) 첫 사용자 입력에서 AudioContext resume + 무음 버퍼 재생
  //  2) 무음 루프 <audio>로 오디오 세션을 'playback'으로 전환 → 무음 스위치에도 소리 재생
  let unlocked = false;
  let silentEl;
  function unlockAudio() {
    if (unlocked) return;
    const ac = audio();
    if (ac.state === "suspended") ac.resume();
    // 무음 버퍼 1샘플 재생
    const b = ac.createBuffer(1, 1, 22050);
    const s = ac.createBufferSource();
    s.buffer = b; s.connect(ac.destination); s.start(0);
    // 무음 루프 오디오 (iOS 무음 스위치 우회)
    if (!silentEl) {
      silentEl = new Audio(
        "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA="
      );
      silentEl.loop = true;
      silentEl.volume = 0.001;
    }
    silentEl.play().catch(function(){});
    unlocked = true;
  }
  // 화면 어디를 처음 만지든 언락
  ["pointerdown", "touchstart", "keydown"].forEach(function (ev) {
    window.addEventListener(ev, unlockAudio, { once: false, passive: true });
  });
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden && ctx && ctx.state === "suspended") ctx.resume();
  });

  // 두 단계(누름/뗌) 클릭. variant: 음높이/질감 살짝 다르게
  function click(variant, down) {
    const ac = audio();
    if (ac.state === "suspended") ac.resume();
    const t = ac.currentTime;
    const base = variant === "hi" ? 1.0 : 0.82;

    // 1) 짧은 노이즈 버스트 = 플라스틱 부딪히는 '딱'
    const dur = 0.045;
    const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = Math.pow(1 - i / data.length, down ? 7 : 12);
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = (down ? 2600 : 3400) * base;
    bp.Q.value = 0.8;
    const ng = ac.createGain();
    ng.gain.value = down ? 0.5 : 0.32;
    noise.connect(bp).connect(ng).connect(ac.destination);
    noise.start(t);
    noise.stop(t + dur);

    // 2) 짧은 톤 = '딸깍'의 울림
    const osc = ac.createOscillator();
    osc.type = "triangle";
    osc.frequency.setValueAtTime((down ? 720 : 1050) * base, t);
    osc.frequency.exponentialRampToValueAtTime((down ? 380 : 620) * base, t + 0.03);
    const og = ac.createGain();
    og.gain.setValueAtTime(down ? 0.22 : 0.14, t);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
    osc.connect(og).connect(ac.destination);
    osc.start(t);
    osc.stop(t + 0.06);
  }

  // ── 키캡 누름/뗌 처리 ──
  const caps = {};
  document.querySelectorAll(".keycap").forEach((cap) => {
    caps[cap.dataset.key] = cap;
  });

  function press(cap) {
    if (!cap || cap.classList.contains("pressed")) return;
    cap.classList.add("pressed");
    click(cap.dataset.sound, true);
  }
  function release(cap) {
    if (!cap || !cap.classList.contains("pressed")) return;
    cap.classList.remove("pressed");
    click(cap.dataset.sound, false);
  }

  // 포인터(마우스/터치)
  document.querySelectorAll(".keycap").forEach((cap) => {
    cap.addEventListener("pointerdown", (e) => { e.preventDefault(); unlockAudio(); press(cap); });
    cap.addEventListener("pointerup", () => release(cap));
    cap.addEventListener("pointerleave", () => release(cap));
    cap.addEventListener("pointercancel", () => release(cap));
  });

  // 키보드 F / J
  window.addEventListener("keydown", (e) => {
    if (e.repeat) return;
    const cap = caps[e.key.toLowerCase()];
    if (cap) { e.preventDefault(); press(cap); }
  });
  window.addEventListener("keyup", (e) => {
    const cap = caps[e.key.toLowerCase()];
    if (cap) release(cap);
  });
})();
</script>
</body>
</html>
