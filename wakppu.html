<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>왁뿌볼 · 눌러서 빠작</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overscroll-behavior: none; }
  body {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 22px;
    background: radial-gradient(120% 120% at 50% 0%, #2a2230 0%, #1a1620 60%, #110e16 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Malgun Gothic", sans-serif;
    color: #cabfd4; user-select: none; overflow: hidden;
  }
  .title { font-size: 13px; letter-spacing: 3px; font-weight: 700; color: #b79fd0; }
  .stage {
    position: relative;
    width: min(82vw, 360px);
    aspect-ratio: 1 / 1;
    touch-action: none;
    filter: drop-shadow(0 24px 36px rgba(0,0,0,0.55));
    transition: transform .07s ease;
  }
  .stage.squish { transform: scale(0.95); }
  .stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; }
  .hint { font-size: 12px; opacity: .65; height: 16px; transition: opacity .3s; }
  .done .hint { opacity: 0; }
  .toast {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%) scale(.8);
    padding: 10px 18px; border-radius: 999px;
    background: rgba(255,255,255,.92); color: #5b3b6e; font-weight: 800;
    font-size: 16px; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
  }
  .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  .reset {
    appearance: none; border: 0; cursor: pointer;
    padding: 11px 22px; border-radius: 999px;
    background: linear-gradient(160deg, #c9a7e6, #a981d6);
    color: #fff; font-weight: 800; font-size: 14px; letter-spacing: .5px;
    box-shadow: 0 8px 18px -6px rgba(160,120,210,.7);
    transition: transform .06s ease, filter .15s;
  }
  .reset:active { transform: translateY(2px); filter: brightness(.95); }
</style>
</head>
<body>
  <div class="title">왁 뿌 볼</div>

  <div class="stage" id="stage">
    <canvas id="slime"></canvas>
    <canvas id="wax"></canvas>
    <canvas id="fx"></canvas>
    <div class="toast" id="toast">다 부쉈다! 🎉</div>
  </div>

  <div class="hint" id="hint">콕콕 눌러서 왁스를 깨보세요 (문지르면 이어서 깨짐)</div>
  <button class="reset" id="reset">다시 코팅하기</button>

<script>
(function () {
  const stage = document.getElementById("stage");
  const slimeC = document.getElementById("slime");
  const waxC = document.getElementById("wax");
  const fxC = document.getElementById("fx");
  const toast = document.getElementById("toast");
  const sc = slimeC.getContext("2d");
  const wc = waxC.getContext("2d");
  const fc = fxC.getContext("2d");

  let W=0,H=0,R=0,CX=0,CY=0,DPR=1;

  // ── 속 색 테마(랜덤) ──
  const THEMES = [
    { name:"솜사탕", stops:["#ffb3d9","#c9a7f0","#9ed1ff"], beads:["#ffffff","#fff3a8","#ffd1e8"] },
    { name:"피스타치오", stops:["#cfe89a","#8fc46b","#5d9648"], beads:["#7a4a2a","#fff6d8","#b5e08a"] },
    { name:"그레이프", stops:["#d7b3ff","#a974e6","#6f3fb0"], beads:["#ffffff","#e7c6ff","#ffd86b"] },
    { name:"피치", stops:["#ffd9a8","#ff9e7d","#f06a6a"], beads:["#fff3d8","#ffffff","#ffc4a8"] },
    { name:"민트초코", stops:["#bff0e0","#7fd9c2","#4ea892"], beads:["#5a3b2a","#3a261a","#ffffff"] },
  ];
  let theme = THEMES[0];

  function setup() {
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    const rect = stage.getBoundingClientRect();
    W = Math.round(rect.width*DPR); H = Math.round(rect.height*DPR);
    [slimeC,waxC,fxC].forEach(c => { c.width=W; c.height=H; });
    CX=W/2; CY=H/2; R=W*0.46;
    drawSlime(); coatWax();
  }

  // ── 슬라임 본체 + 비즈 ──
  function drawSlime() {
    sc.clearRect(0,0,W,H);
    sc.save();
    sc.beginPath(); sc.arc(CX,CY,R,0,Math.PI*2); sc.clip();

    const g = sc.createRadialGradient(CX-R*0.3,CY-R*0.35,R*0.1,CX,CY,R);
    g.addColorStop(0, theme.stops[0]);
    g.addColorStop(0.5, theme.stops[1]);
    g.addColorStop(1, theme.stops[2]);
    sc.fillStyle = g; sc.fillRect(0,0,W,H);

    // 속 비치는 반투명 블롭
    for (let i=0;i<10;i++){
      const a=Math.random()*Math.PI*2, rr=Math.random()*R*0.72;
      const bx=CX+Math.cos(a)*rr, by=CY+Math.sin(a)*rr, br=R*(0.1+Math.random()*0.22);
      const bg=sc.createRadialGradient(bx,by,0,bx,by,br);
      bg.addColorStop(0,"rgba(255,255,255,0.35)");
      bg.addColorStop(1,"rgba(255,255,255,0)");
      sc.fillStyle=bg; sc.beginPath(); sc.arc(bx,by,br,0,Math.PI*2); sc.fill();
    }

    // 비즈(작은 알갱이)
    const beads = Math.floor((R*R)/650);
    for (let i=0;i<beads;i++){
      const a=Math.random()*Math.PI*2, rr=Math.sqrt(Math.random())*R*0.92;
      const x=CX+Math.cos(a)*rr, y=CY+Math.sin(a)*rr;
      const s=(2.5+Math.random()*3.5)*DPR;
      const col=theme.beads[(Math.random()*theme.beads.length)|0];
      sc.fillStyle=col; sc.beginPath(); sc.arc(x,y,s,0,Math.PI*2); sc.fill();
      sc.fillStyle="rgba(255,255,255,0.8)";
      sc.beginPath(); sc.arc(x-s*0.3,y-s*0.3,s*0.32,0,Math.PI*2); sc.fill();
    }

    // 윤기 + 림
    const hg=sc.createRadialGradient(CX-R*0.38,CY-R*0.42,0,CX-R*0.38,CY-R*0.42,R*0.6);
    hg.addColorStop(0,"rgba(255,255,255,0.7)");
    hg.addColorStop(0.5,"rgba(255,255,255,0.1)");
    hg.addColorStop(1,"rgba(255,255,255,0)");
    sc.fillStyle=hg; sc.beginPath();
    sc.ellipse(CX-R*0.32,CY-R*0.36,R*0.42,R*0.3,-0.5,0,Math.PI*2); sc.fill();
    const rim=sc.createRadialGradient(CX,CY,R*0.7,CX,CY,R);
    rim.addColorStop(0,"rgba(40,10,40,0)"); rim.addColorStop(1,"rgba(30,5,30,0.5)");
    sc.fillStyle=rim; sc.fillRect(0,0,W,H);
    sc.restore();
  }

  // ── 왁스 코팅 ──
  function coatWax() {
    theme = THEMES[(Math.random()*THEMES.length)|0];
    drawSlime();
    wc.globalCompositeOperation="source-over";
    wc.clearRect(0,0,W,H);
    wc.save();
    wc.beginPath(); wc.arc(CX,CY,R,0,Math.PI*2); wc.clip();

    const g=wc.createRadialGradient(CX-R*0.3,CY-R*0.35,R*0.1,CX,CY,R);
    g.addColorStop(0,"#fbfbf7"); g.addColorStop(0.6,"#eceae4"); g.addColorStop(1,"#d7d4cd");
    wc.fillStyle=g; wc.fillRect(0,0,W,H);

    const dots=Math.floor((R*R)/90);
    for (let i=0;i<dots;i++){
      const a=Math.random()*Math.PI*2, rr=Math.sqrt(Math.random())*R;
      const x=CX+Math.cos(a)*rr, y=CY+Math.sin(a)*rr, s=Math.random()*1.6*DPR+0.3*DPR;
      wc.fillStyle=Math.random()>0.5?"rgba(255,255,255,0.6)":"rgba(150,148,140,0.35)";
      wc.beginPath(); wc.arc(x,y,s,0,Math.PI*2); wc.fill();
    }
    const hg=wc.createRadialGradient(CX-R*0.4,CY-R*0.44,0,CX-R*0.4,CY-R*0.44,R*0.55);
    hg.addColorStop(0,"rgba(255,255,255,0.85)"); hg.addColorStop(1,"rgba(255,255,255,0)");
    wc.fillStyle=hg; wc.beginPath();
    wc.ellipse(CX-R*0.34,CY-R*0.38,R*0.36,R*0.26,-0.5,0,Math.PI*2); wc.fill();
    const rim=wc.createRadialGradient(CX,CY,R*0.72,CX,CY,R);
    rim.addColorStop(0,"rgba(120,116,108,0)"); rim.addColorStop(1,"rgba(90,86,80,0.5)");
    wc.fillStyle=rim; wc.fillRect(0,0,W,H);
    wc.restore();

    done=false; firstCrack=true;
    stage.classList.remove("done"); toast.classList.remove("show");
  }

  // ── 깨기(누르기) ──
  function inBall(x,y){ const dx=x-CX,dy=y-CY; return dx*dx+dy*dy<=R*R; }

  function jaggedPoly(x,y,rad){
    const n=8+(Math.random()*5|0), pts=[];
    for (let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2;
      const r=rad*(0.6+Math.random()*0.7);
      pts.push([x+Math.cos(a)*r, y+Math.sin(a)*r]);
    }
    return pts;
  }

  function crackAt(x,y,big){
    const rad = R * (big ? 0.24 : 0.15);
    const poly = jaggedPoly(x,y,rad);

    wc.save();
    wc.beginPath(); wc.arc(CX,CY,R,0,Math.PI*2); wc.clip();

    // 1) 퍼지는 금(빠작) — 남는 왁스에 그려짐
    wc.strokeStyle="rgba(110,106,98,0.55)";
    wc.lineWidth=1.4*DPR; wc.lineCap="round";
    const spokes=4+(Math.random()*3|0);
    for (let s=0;s<spokes;s++){
      const a=Math.random()*Math.PI*2;
      let px=x, py=y; wc.beginPath(); wc.moveTo(px,py);
      const segs=3+(Math.random()*3|0), len=rad*(1.4+Math.random());
      for (let k=1;k<=segs;k++){
        const t=(k/segs);
        px=x+Math.cos(a)*len*t + (Math.random()-0.5)*rad*0.4;
        py=y+Math.sin(a)*len*t + (Math.random()-0.5)*rad*0.4;
        wc.lineTo(px,py);
      }
      wc.stroke();
    }

    // 2) 조각 제거(cave-in)
    wc.globalCompositeOperation="destination-out";
    wc.beginPath(); wc.moveTo(poly[0][0],poly[0][1]);
    for (let i=1;i<poly.length;i++) wc.lineTo(poly[i][0],poly[i][1]);
    wc.closePath(); wc.fill();
    wc.globalCompositeOperation="source-over";

    // 3) 깨진 단면 두께(크림색 림) — 입체감
    wc.beginPath(); wc.moveTo(poly[0][0],poly[0][1]);
    for (let i=1;i<poly.length;i++) wc.lineTo(poly[i][0],poly[i][1]);
    wc.closePath();
    wc.lineJoin="round";
    wc.strokeStyle="rgba(243,239,230,0.95)"; wc.lineWidth=5*DPR; wc.stroke();
    wc.strokeStyle="rgba(180,175,164,0.6)"; wc.lineWidth=2*DPR; wc.stroke();
    wc.restore();

    spawnChips(x,y, big?9:5);
    crunch(big);
    maybeCheckDone();
  }

  // ── 튀는 왁스 조각 ──
  const chips=[]; let fxRunning=false;
  function spawnChips(x,y,n){
    for (let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=(1+Math.random()*3.5)*DPR;
      chips.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1.8*DPR,
        s:(1.6+Math.random()*3.4)*DPR, life:1, rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.4 });
    }
    if (!fxRunning){ fxRunning=true; requestAnimationFrame(fxLoop); }
  }
  function fxLoop(){
    fc.clearRect(0,0,W,H);
    for (let i=chips.length-1;i>=0;i--){
      const p=chips[i];
      p.vy+=0.35*DPR; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life-=0.024;
      if (p.life<=0){ chips.splice(i,1); continue; }
      fc.save(); fc.translate(p.x,p.y); fc.rotate(p.rot);
      fc.globalAlpha=Math.max(0,p.life); fc.fillStyle="#f3f1ea";
      fc.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.8); fc.restore();
    }
    if (chips.length) requestAnimationFrame(fxLoop);
    else { fc.clearRect(0,0,W,H); fxRunning=false; }
  }

  // ── 소리(Web Audio 합성) ──
  let ctx, unlocked=false, silentEl, lastSound=0;
  function audio(){ if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)(); return ctx; }
  function unlockAudio(){
    if (unlocked) return;
    const ac=audio(); if (ac.state==="suspended") ac.resume();
    const b=ac.createBuffer(1,1,22050); const s=ac.createBufferSource();
    s.buffer=b; s.connect(ac.destination); s.start(0);
    if (!silentEl){ silentEl=new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA="); silentEl.loop=true; silentEl.volume=0.001; }
    silentEl.play().catch(function(){}); unlocked=true;
  }
  ["pointerdown","touchstart","keydown"].forEach(ev=>window.addEventListener(ev,unlockAudio,{passive:true}));

  function crunch(big){
    const ac=audio(); if (ac.state==="suspended") ac.resume();
    const now=ac.currentTime;
    if (now-lastSound<0.02) return;
    lastSound=now;

    // 묵직한 저음 '뿌' (첫 깸/큰 깸일수록 강하게)
    if (big){
      const o=ac.createOscillator(); o.type="sine";
      o.frequency.setValueAtTime(150,now);
      o.frequency.exponentialRampToValueAtTime(60,now+0.12);
      const g=ac.createGain();
      g.gain.setValueAtTime(0.0001,now);
      g.gain.exponentialRampToValueAtTime(0.4,now+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,now+0.16);
      o.connect(g).connect(ac.destination); o.start(now); o.stop(now+0.18);
    }

    // 잘게 부서지는 '빠작/사각' 크런치
    const bursts=(big?4:2)+(Math.random()*3|0);
    for (let k=0;k<bursts;k++){
      const t=now+k*(0.004+Math.random()*0.012);
      const dur=0.018+Math.random()*0.022;
      const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
      const d=buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,6);
      const src=ac.createBufferSource(); src.buffer=buf;
      const bp=ac.createBiquadFilter(); bp.type="bandpass";
      bp.frequency.value=1600+Math.random()*3800; bp.Q.value=0.7+Math.random();
      const g=ac.createGain(); g.gain.value=(big?0.2:0.13)+Math.random()*0.12;
      src.connect(bp).connect(g).connect(ac.destination);
      src.start(t); src.stop(t+dur);
    }
  }

  // ── 진행도(다 부쉈는지) ──
  let done=false, firstCrack=true, checkTick=0;
  function maybeCheckDone(){
    if (done) return;
    if ((checkTick++ % 6)!==0) return;
    const N=60;
    const tmp=maybeCheckDone._c||(maybeCheckDone._c=document.createElement("canvas"));
    tmp.width=N; tmp.height=N;
    const tctx=tmp.getContext("2d"); tctx.clearRect(0,0,N,N); tctx.drawImage(waxC,0,0,N,N);
    const data=tctx.getImageData(0,0,N,N).data;
    let total=0,remain=0; const cx=N/2,cy=N/2,rr=(N/2)*0.92;
    for (let y=0;y<N;y++) for (let x=0;x<N;x++){
      const dx=x-cx,dy=y-cy; if (dx*dx+dy*dy>rr*rr) continue;
      total++; if (data[(y*N+x)*4+3]>25) remain++;
    }
    if (total && remain/total<0.07) finish();
  }
  function finish(){
    done=true; stage.classList.add("done"); toast.classList.add("show");
    const ac=audio(); const t=ac.currentTime;
    [660,880,1320].forEach((f,i)=>{
      const o=ac.createOscillator(); o.type="sine"; o.frequency.value=f;
      const g=ac.createGain();
      g.gain.setValueAtTime(0.0001,t+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.18,t+i*0.08+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.08+0.25);
      o.connect(g).connect(ac.destination); o.start(t+i*0.08); o.stop(t+i*0.08+0.3);
    });
  }

  // ── 입력(누르기 위주 + 누른 채 문지르기) ──
  let holding=false, lastX=null, lastY=null;
  function pos(e){
    const r=stage.getBoundingClientRect();
    return [ (e.clientX-r.left)*(W/r.width), (e.clientY-r.top)*(H/r.height) ];
  }
  stage.addEventListener("pointerdown",(e)=>{
    e.preventDefault(); unlockAudio();
    holding=true; stage.classList.add("squish");
    stage.setPointerCapture && stage.setPointerCapture(e.pointerId);
    const [x,y]=pos(e); lastX=x; lastY=y;
    if (inBall(x,y)){ crackAt(x,y, firstCrack); firstCrack=false; }
  });
  stage.addEventListener("pointermove",(e)=>{
    if (!holding) return; e.preventDefault();
    const [x,y]=pos(e);
    // 일정 거리 이상 움직였을 때만 이어서 깸(누르는 손맛 유지)
    if (lastX!==null){
      const d=Math.hypot(x-lastX,y-lastY);
      if (d > R*0.14 && inBall(x,y)){ crackAt(x,y,false); lastX=x; lastY=y; }
    }
  });
  function end(){ holding=false; lastX=lastY=null; stage.classList.remove("squish"); }
  stage.addEventListener("pointerup",end);
  stage.addEventListener("pointercancel",end);

  document.getElementById("reset").addEventListener("click",()=>{
    chips.length=0; fc.clearRect(0,0,W,H); coatWax();
  });

  setup();
  let rt;
  window.addEventListener("resize",()=>{ clearTimeout(rt); rt=setTimeout(setup,200); });
})();
</script>
</body>
</html>
